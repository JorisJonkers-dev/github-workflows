name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to install.
        required: false
        type: string
        default: '3.13'
      install-command:
        description: Dependency install command.
        required: false
        type: string
        default: python -m pip install -r requirements-dev.txt
      lint-command:
        description: Ruff check command. The command must fail on diagnostics.
        required: false
        type: string
        default: ruff check .
      typecheck-command:
        description: Type check command. Use mypy or pyright, and keep it failing on errors.
        required: false
        type: string
        default: python -m mypy .
      test-command:
        description: Test command.
        required: false
        type: string
        default: python -m unittest discover
      working-directory:
        description: Directory that contains the Python project.
        required: false
        type: string
        default: .

permissions:
  contents: read

jobs:
  python:
    name: Python CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        if: ${{ inputs.install-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: bash -euo pipefail -c "$INSTALL_COMMAND"

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        env:
          LINT_COMMAND: ${{ inputs.lint-command }}
        run: bash -euo pipefail -c "$LINT_COMMAND"

      - name: Typecheck
        if: ${{ inputs.typecheck-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        env:
          TYPECHECK_COMMAND: ${{ inputs.typecheck-command }}
        run: bash -euo pipefail -c "$TYPECHECK_COMMAND"

      - name: Test
        if: ${{ inputs.test-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
        run: bash -euo pipefail -c "$TEST_COMMAND"
