name: JVM CI

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version to install.
        required: false
        type: string
        default: '21'
      java-distribution:
        description: Java distribution to install.
        required: false
        type: string
        default: temurin
      working-directory:
        description: Directory that contains the Gradle build.
        required: false
        type: string
        default: .
      gradle-command:
        description: Gradle command to run.
        required: false
        type: string
        default: ./gradlew
      gradle-args:
        description: Additional Gradle arguments appended to lint and test commands.
        required: false
        type: string
        default: --no-daemon
      lint-gradle-args:
        description: Gradle tasks or arguments for lint checks.
        required: false
        type: string
        default: check
      test-gradle-args:
        description: Gradle tasks or arguments for tests.
        required: false
        type: string
        default: test
      packages-token:
        description: GitHub Packages token passed to Gradle as GITHUB_TOKEN.
        required: false
        type: string
        default: ''
    secrets:
      packages-token:
        description: GitHub Packages token passed to Gradle as GITHUB_TOKEN.
        required: false

permissions:
  contents: read

jobs:
  lint:
    name: JVM Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve workflow ref
        id: workflow-ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          ref="${WORKFLOW_REF#*@}"
          if [ -z "$ref" ] || [ "$ref" = "$WORKFLOW_REF" ]; then
            echo "::error::Unable to resolve reusable workflow ref from $WORKFLOW_REF"
            exit 1
          fi

          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          repository: JorisJonkers-dev/github-workflows
          ref: ${{ steps.workflow-ref.outputs.ref }}
          path: .github-workflows
          persist-credentials: false

      - uses: ./.github-workflows/actions/setup-java-gradle
        with:
          java-distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          github-packages-token: ${{ inputs.packages-token || secrets.packages-token }}

      - name: Run lint checks
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.gradle-command }} ${{ inputs.lint-gradle-args }} ${{ inputs.gradle-args }}

  test:
    name: JVM Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve workflow ref
        id: workflow-ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          ref="${WORKFLOW_REF#*@}"
          if [ -z "$ref" ] || [ "$ref" = "$WORKFLOW_REF" ]; then
            echo "::error::Unable to resolve reusable workflow ref from $WORKFLOW_REF"
            exit 1
          fi

          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          repository: JorisJonkers-dev/github-workflows
          ref: ${{ steps.workflow-ref.outputs.ref }}
          path: .github-workflows
          persist-credentials: false

      - uses: ./.github-workflows/actions/setup-java-gradle
        with:
          java-distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          github-packages-token: ${{ inputs.packages-token || secrets.packages-token }}

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.gradle-command }} ${{ inputs.test-gradle-args }} ${{ inputs.gradle-args }}
