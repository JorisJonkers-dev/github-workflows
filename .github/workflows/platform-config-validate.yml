name: Platform Config Validate

on:
  workflow_call:
    inputs:
      config-paths:
        description: Newline- or comma-separated file globs to validate.
        required: false
        type: string
        default: |-
          platform/**/*.yaml
          platform/**/*.yml
      schema-kind:
        description: Schema kind to validate.
        required: false
        type: string
        default: auto
      package-version:
        description: Version of @jorisjonkers-dev/deploy-config-schema to install.
        required: false
        type: string
        default: 0.3.0
      node-auth-token:
        description: Token with packages:read for installing @jorisjonkers-dev packages from GitHub Packages (pass secrets.GITHUB_TOKEN).
        required: false
        type: string
        default: ""
      drift-check:
        description: Run render-tree --check after validation when true.
        required: false
        type: boolean
        default: false
      working-directory:
        description: Directory where config globs are evaluated.
        required: false
        type: string
        default: .

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Platform Config Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Resolve workflow ref
        id: workflow-ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          ref="${WORKFLOW_REF#*@}"
          if [ -z "$ref" ] || [ "$ref" = "$WORKFLOW_REF" ]; then
            echo "::error::Unable to resolve reusable workflow ref from $WORKFLOW_REF"
            exit 1
          fi

          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7.0.0
        with:
          repository: JorisJonkers-dev/github-workflows
          ref: ${{ github.job_workflow_sha }}
          path: .github-workflows
          persist-credentials: false

      - name: Validate platform config
        uses: ./.github-workflows/actions/platform-config-validate
        with:
          config-paths: ${{ inputs.config-paths }}
          schema-kind: ${{ inputs.schema-kind }}
          package-version: ${{ inputs.package-version }}
          node-auth-token: ${{ inputs.node-auth-token != '' && inputs.node-auth-token || github.token }}
          drift-check: ${{ inputs.drift-check && 'true' || 'false' }}
          working-directory: ${{ inputs.working-directory }}
