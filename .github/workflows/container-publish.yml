name: Container Publish

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name below ghcr.io/<owner>/.
        required: true
        type: string
      version:
        description: Release version tag.
        required: true
        type: string
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: Dockerfile
      platforms:
        description: Target platforms.
        required: false
        type: string
        default: linux/amd64
    secrets:
      packages-token:
        description: Token passed as docker build secret github_token.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Container Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${owner}/${IMAGE_NAME}"
          if [ "$image_ref" != "$(printf '%s' "$image_ref" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "::error::Docker image reference must be lowercase: $image_ref"
            exit 1
          fi

          {
            echo 'tags<<EOF'
            printf '%s:%s\n' "$image_ref" "$VERSION"
            printf '%s:sha-%s\n' "$image_ref" "$GITHUB_SHA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.image-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
          secrets: |
            github_token=${{ secrets.packages-token || github.token }}
            github_actor=${{ github.actor }}
