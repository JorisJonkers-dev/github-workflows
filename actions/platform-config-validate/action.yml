name: Platform Config Validate
description: Validate platform YAML with @extratoast/deploy-config-schema and optionally check rendered-tree drift.

inputs:
  config-paths:
    description: Newline- or comma-separated file globs to validate.
    required: false
    default: |-
      platform/**/*.yaml
      platform/**/*.yml
  schema-kind:
    description: Schema kind to validate. Supported values are platform, deploy-config, service-intent, fleet-inventory, vault-dynamic-secrets, or auto.
    required: false
    default: auto
  package-version:
    description: Version of @extratoast/deploy-config-schema to install.
    required: false
    default: 0.3.0
  node-auth-token:
    description: Token with packages:read for installing @extratoast packages from GitHub Packages (pass secrets.GITHUB_TOKEN).
    required: false
    default: ""
  drift-check:
    description: Run render-tree --check after validation when true.
    required: false
    default: 'false'
  working-directory:
    description: Directory where config globs are evaluated.
    required: false
    default: .

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Validate platform config
      shell: bash
      env:
        CONFIG_PATHS: ${{ inputs.config-paths }}
        SCHEMA_KIND: ${{ inputs.schema-kind }}
        PACKAGE_VERSION: ${{ inputs.package-version }}
        NODE_AUTH_TOKEN: ${{ inputs.node-auth-token }}
        DRIFT_CHECK: ${{ inputs.drift-check }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: bash "${{ github.action_path }}/run.sh"
