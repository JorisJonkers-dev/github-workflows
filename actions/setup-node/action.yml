name: Setup Node
description: Configure Node, package-manager caching, and install workspace dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '24'
  package-manager:
    description: Package manager to configure. Supported values are npm, pnpm, and yarn.
    required: false
    default: pnpm
  cache-dependency-path:
    description: Path to the package-manager lockfile or lockfiles used for caching.
    required: false
    default: ''
  working-directory:
    description: Directory where dependencies should be installed.
    required: false
    default: .
  install-command:
    description: Command used to install dependencies. Defaults by package-manager when empty.
    required: false
    default: ''
  github-packages-token:
    description: GitHub Packages token used to authenticate npm package installs.
    required: false
    default: ''
  npm-scope:
    description: npm scope resolved from GitHub Packages when github-packages-token is set.
    required: false
    default: '@jorisjonkers-dev'
  github-packages-registry:
    description: npm registry URL used for the configured GitHub Packages scope.
    required: false
    default: https://npm.pkg.github.com

runs:
  using: composite
  steps:
    - name: Validate package manager
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: |
        case "$PACKAGE_MANAGER" in
          npm|pnpm|yarn)
            ;;
          *)
            echo "::error::Unsupported package-manager: $PACKAGE_MANAGER. Use npm, pnpm, or yarn."
            exit 1
            ;;
        esac

    - name: Enable Corepack for Yarn
      if: ${{ inputs.package-manager == 'yarn' }}
      shell: bash
      run: corepack enable

    - name: Set up pnpm
      if: ${{ inputs.package-manager == 'pnpm' }}
      uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Configure GitHub Packages for npm
      if: ${{ inputs.github-packages-token != '' }}
      shell: bash
      env:
        GITHUB_PACKAGES_TOKEN: ${{ inputs.github-packages-token }}
        GITHUB_PACKAGES_REGISTRY: ${{ inputs.github-packages-registry }}
        NPM_SCOPE: ${{ inputs.npm-scope }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        scope="$NPM_SCOPE"
        case "$scope" in
          @*)
            ;;
          *)
            scope="@$scope"
            ;;
        esac

        registry="${GITHUB_PACKAGES_REGISTRY%/}"
        registry_host="${registry#http://}"
        registry_host="${registry_host#https://}"
        npmrc_path="$WORKING_DIRECTORY/.npmrc"

        mkdir -p "$WORKING_DIRECTORY"
        touch "$npmrc_path"
        {
          printf '%s:registry=%s\n' "$scope" "$registry"
          printf '//%s/:_authToken=%s\n' "$registry_host" "$GITHUB_PACKAGES_TOKEN"
        } >> "$npmrc_path"

        printf 'NODE_AUTH_TOKEN=%s\n' "$GITHUB_PACKAGES_TOKEN" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INSTALL_COMMAND: ${{ inputs.install-command }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: |
        if [ -z "$INSTALL_COMMAND" ]; then
          case "$PACKAGE_MANAGER" in
            npm)
              INSTALL_COMMAND="npm ci"
              ;;
            pnpm)
              INSTALL_COMMAND="pnpm install --frozen-lockfile"
              ;;
            yarn)
              INSTALL_COMMAND="yarn install --immutable"
              ;;
          esac
        fi

        bash -c "$INSTALL_COMMAND"
