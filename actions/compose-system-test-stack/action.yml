name: Docker Compose System-Test Stack
description: Run a generic Docker Compose CI/system-test stack with waits, diagnostics, cleanup, and optional migration checks.

inputs:
  compose-files:
    description: Newline-separated compose files, evaluated by the caller repository.
    required: false
    default: |-
      docker-compose.yml
      docker-compose.ci.yml
  services:
    description: Space-separated compose services to start. Empty means the caller's full selected stack.
    required: false
    default: ''
  project-name:
    description: Optional Docker Compose project name.
    required: false
    default: ''
  working-directory:
    description: Directory containing the compose files and caller-owned hook scripts.
    required: false
    default: .
  wait-strategy:
    description: Wait mode. Supported values are compose-wait, services, command, routes, or none.
    required: false
    default: compose-wait
  wait-command:
    description: Caller-owned command for wait-strategy=command.
    required: false
    default: ''
  wait-routes-file:
    description: Caller-owned route list for wait-strategy=routes. Each non-comment line is "name url" or "url".
    required: false
    default: ''
  wait-timeout-seconds:
    description: Timeout per route when wait-strategy=routes.
    required: false
    default: '300'
  wait-interval-seconds:
    description: Poll interval per route when wait-strategy=routes.
    required: false
    default: '2'
  migration-check-command:
    description: Optional caller-owned command that verifies migrations after stack startup.
    required: false
    default: ''
  diagnostics-command:
    description: Optional caller-owned diagnostics command for failures. Built-in compose diagnostics always run first.
    required: false
    default: ''
  cleanup-command:
    description: Optional caller-owned cleanup command run before docker compose down.
    required: false
    default: ''
  up-args:
    description: Extra docker compose up arguments.
    required: false
    default: --no-build --wait --timeout 300 -d
  down-on-complete:
    description: Whether to run docker compose down after the stack step completes.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Run Docker Compose system-test stack
      shell: bash
      env:
        COMPOSE_FILES: ${{ inputs.compose-files }}
        SERVICES: ${{ inputs.services }}
        PROJECT_NAME: ${{ inputs.project-name }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        WAIT_STRATEGY: ${{ inputs.wait-strategy }}
        WAIT_COMMAND: ${{ inputs.wait-command }}
        WAIT_ROUTES_FILE: ${{ inputs.wait-routes-file }}
        WAIT_TIMEOUT_SECONDS: ${{ inputs.wait-timeout-seconds }}
        WAIT_INTERVAL_SECONDS: ${{ inputs.wait-interval-seconds }}
        MIGRATION_CHECK_COMMAND: ${{ inputs.migration-check-command }}
        DIAGNOSTICS_COMMAND: ${{ inputs.diagnostics-command }}
        CLEANUP_COMMAND: ${{ inputs.cleanup-command }}
        UP_ARGS: ${{ inputs.up-args }}
        DOWN_ON_COMPLETE: ${{ inputs.down-on-complete }}
      run: bash "${{ github.action_path }}/run.sh"
